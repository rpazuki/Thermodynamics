theme: minima

title: "Thermodynamics Research Wiki"
description: "A personal research wiki covering the founding texts of classical and statistical thermodynamics."

# Only show the homepage in the top navigation bar.
# Without this, minima lists every single Jekyll page in the header.
header_pages:
  - index.md

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  # No math_engine: kramdown's mathjax engine emits <script type="math/tex">
  # which MathJax 3 does not process. MathJax 3 is loaded in _includes/head.html
  # and handles $...$ and \[...\] directly in the rendered HTML.

# Layout defaults:
#   - root index.md uses 'default' (no auto-injected <h1> from frontmatter title)
#   - all pages under wiki/ use the custom 'wiki' layout (collapsible metadata panel,
#     no auto-injected <h1>)
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "wiki"
      type: "pages"
    values:
      layout: "wiki"

# Exclude non-site files from Jekyll build
exclude:
  - raw/
  - .claude/
  - MCPs/
  - AGENTS.md
  - SETUP.md
  - README.md
  - "*.tex"
  - "*.pdf"
